<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ai Video Creator 302 - Pro Engine</title>
    <style>
        :root {
            --primary-blue: #0056b3;
            --light-blue: #e6f2ff;
            --white: #ffffff;
            --dark-text: #333333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: var(--dark-text);
            margin: 0;
            padding: 0;
        }
        header {
            background: linear-gradient(135deg, var(--primary-blue), #003d82);
            color: var(--white);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            animation: slideDown 0.5s ease-out;
        }
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .card {
            background: var(--white);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border-top: 4px solid var(--primary-blue);
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        h2 { color: var(--primary-blue); font-size: 1.5rem; }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            background-color: var(--primary-blue);
            color: var(--white);
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background 0.3s ease;
        }
        button:hover { background-color: #003d82; }
        .result-box {
            margin-top: 15px;
            padding: 15px;
            background: var(--light-blue);
            border-radius: 6px;
            min-height: 100px;
        }
        @keyframes slideDown {
            from { transform: translateY(-100%); }
            to { transform: translateY(0); }
        }
    </style>
</head>
<body>

<header>
    <h1>Ai Video Creator 302</h1>
    <p>Pro Local AI Engine - No API Required</p>
</header>

<div class="container">
    <div class="card">
        <h2>AI Assistant</h2>
        <div class="result-box" id="chatHistory">Chat history will appear here...</div>
        <input type="text" id="chatInput" placeholder="Ask anything...">
        <button onclick="sendChat()">Send to Local AI</button>
    </div>

    <div class="card">
        <h2>Text to Image</h2>
        <textarea id="imagePrompt" rows="3" placeholder="Describe the realistic image..."></textarea>
        <select id="imageSize">
            <option value="1024x1024">1024x1024 (Square)</option>
            <option value="1920x1080">1920x1080 (Landscape)</option>
            <option value="1080x1920">1080x1920 (Portrait)</option>
        </select>
        <button onclick="generateMedia('image')">Generate Image</button>
        <div class="result-box" id="imageResult">Image output...</div>
    </div>

    <div class="card">
        <h2>Image to Video</h2>
        <input type="file" id="videoImageInput" accept="image/*">
        <textarea id="videoPrompt" rows="2" placeholder="Animation details (e.g., pan left, cinematic)"></textarea>
        <button onclick="generateMedia('video')">Generate Video</button>
        <div class="result-box" id="videoResult">Video output...</div>
    </div>
</div>

<script>
    // JS functions to connect to local Python Backend
    async function sendChat() {
        const input = document.getElementById('chatInput').value;
        const history = document.getElementById('chatHistory');
        history.innerHTML += `<br><b>You:</b> ${input}`;
        
        // Fetch to local backend
        const response = await fetch('http://127.0.0.1:5000/api/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({prompt: input})
        });
        const data = await response.json();
        history.innerHTML += `<br><b>AI 302:</b> ${data.reply}`;
    }

    async function generateMedia(type) {
        const resultDiv = document.getElementById(`${type}Result`);
        resultDiv.innerHTML = "Processing locally... This may take time based on hardware.";
        // Additional fetch logic for media generation would go here
    }
</script>
</body>
</html>
